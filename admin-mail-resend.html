<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>worktalk 運営管理画面 - ご案内メール再送</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.3); z-index:1000; display:flex; align-items:center; justify-content:center; }
    .modal { background:#fff; border-radius:8px; padding:40px; max-width:520px; width:90%; max-height:85vh; overflow-y:auto; }
    .modal-title { font-size:1.1rem; font-weight:700; margin-bottom:24px; }
    .modal-select { width:100%; border:1px solid #ccc; border-radius:6px; padding:10px 12px; font-size:0.9rem; margin-bottom:16px; font-family:inherit; color:#333; }
    .modal-btn-primary { display:inline-block; padding:10px 32px; background:var(--color-primary, #1a73e8); color:#fff; border:none; border-radius:6px; font-size:0.9rem; font-weight:600; cursor:pointer; margin-right:8px; }
    .modal-btn-primary:hover { opacity:0.9; }
    .modal-btn-outline { display:inline-block; padding:10px 32px; background:#fff; color:#333; border:1px solid #ccc; border-radius:6px; font-size:0.9rem; font-weight:600; cursor:pointer; }
    .modal-btn-outline:hover { background:#f5f5f5; }
  </style>
</head>
<body>
  <div class="layout">
    <header class="header">
      <div class="header-left">
        <button class="hamburger" onclick="toggleSidebar()" aria-label="メニュー">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <a href="admin-top-nocard.html" class="header-logo">worktalk<span>運営管理画面</span></a>
      </div>
      <div class="header-right">
        <a href="#" style="font-size:0.8rem;color:var(--color-primary);text-decoration:none;">アカウントを切り替える</a>
        <div class="notification-bell">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <div class="notification-badge"></div>
        </div>
        <div class="header-user">
          <div class="avatar">小泰</div>
          <div>
            <div class="header-user-name">小野 泰征</div>
            <div class="header-user-role">管理者</div>
          </div>
        </div>
      </div>
    </header>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <nav class="sidebar">
      <div class="sidebar-group">
        <div class="sidebar-group-title">ユーザー</div>
        <a href="admin-top-nocard.html" class="sidebar-link">応募ユーザー一覧</a>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-title">問い合わせ</div>
        <a href="admin-contact-list.html" class="sidebar-link">LP問い合わせ一覧</a>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-title">企業</div>
        <a href="admin-company-list.html" class="sidebar-link">契約企業一覧</a>
        <a href="admin-job-check.html" class="sidebar-link">求人チェックリスト</a>
        <a href="admin-change-staff.html" class="sidebar-link">企業担当者の変更</a>
        <a href="admin-company-reg.html" class="sidebar-link">①新規企業登録</a>
        <a href="admin-account-issue.html" class="sidebar-link">②企業アカウント発行</a>
        <a href="admin-mail-resend.html" class="sidebar-link active">ご案内メール再送</a>
        <a href="admin-mail-bulk.html" class="sidebar-link">メール一斉送信</a>
        <a href="#" class="sidebar-link">メール送信情報</a>
        <a href="admin-wtd-log.html" class="sidebar-link">worktalkログ確認</a>
        <a href="admin-lp-log.html" class="sidebar-link">LPログ確認</a>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-title">管理者作成</div>
        <a href="admin-account-create.html" class="sidebar-link">アカウント発行</a>
      </div>
    </nav>

    <main class="main">
      <div class="page-header">
        <h1 class="page-title">企業アカウント発行画面</h1>
      </div>

      <div class="table-card" style="padding:32px;">
        <div style="max-width:600px;">
          <div style="margin-bottom:16px;">
            <label style="font-weight:700; font-size:0.9rem; display:block; margin-bottom:6px;">会社名</label>
            <input type="text" placeholder="会社名" style="width:100%; padding:10px 12px; border:1px solid #ccc; border-radius:6px; font-size:0.9rem;">
          </div>
          <div style="margin-bottom:16px;">
            <label style="font-weight:700; font-size:0.9rem; display:block; margin-bottom:6px;">担当者名</label>
            <input type="text" placeholder="担当者名" style="width:100%; padding:10px 12px; border:1px solid #ccc; border-radius:6px; font-size:0.9rem;">
          </div>
          <div style="margin-bottom:16px;">
            <label style="font-weight:700; font-size:0.9rem; display:block; margin-bottom:6px;">メールアドレス</label>
            <input type="email" placeholder="メールアドレス" style="width:100%; padding:10px 12px; border:1px solid #ccc; border-radius:6px; font-size:0.9rem;">
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal Overlay -->
  <div class="modal-overlay">
    <div class="modal">
      <div class="modal-title">アカウント情報ご案内メール再送</div>
      <select class="modal-select">
        <option value="" disabled selected>会社名</option>
      </select>
      <select class="modal-select">
        <option value="" disabled selected>人事</option>
      </select>
      <div style="display:flex; gap:8px; margin-top:16px;">
        <button class="modal-btn-primary">メールを再送する</button>
        <button class="modal-btn-outline">閉じる</button>
      </div>
    </div>
  </div>

  <script>
    function toggleSidebar() {
      document.querySelector('.sidebar').classList.toggle('open');
      document.querySelector('.sidebar-overlay').classList.toggle('open');
    }
  </script>
</body>
</html>
