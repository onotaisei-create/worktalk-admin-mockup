<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>worktalk 企業管理画面 - 会社情報編集</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <header class="header">
      <div class="header-left">
        <button class="hamburger" onclick="toggleSidebar()" aria-label="メニュー">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <a href="company-top-nocard.html" class="header-logo">worktalk<span>企業管理画面</span></a>
      </div>
      <div class="header-right">
        <div class="header-company">マイキャリア株式会社<small>様</small></div>
        <div class="notification-bell">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <div class="notification-badge"></div>
        </div>
        <div class="header-user">
          <div class="avatar">担当</div>
          <div>
            <div class="header-user-name">採用担当者</div>
            <div class="header-user-role">企業アカウント</div>
          </div>
        </div>
      </div>
    </header>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <nav class="sidebar">
      <div class="sidebar-group">
        <div class="sidebar-group-title">応募者情報</div>
        <a href="company-top-nocard.html" class="sidebar-link">応募者一覧</a>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-title">企業情報</div>
        <a href="company-info-edit.html" class="sidebar-link active">企業情報編集</a>
        <a href="jobposting.html" class="sidebar-link">求人情報作成</a>
        <a href="jobposting-list.html" class="sidebar-link">求人情報一覧</a>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-title">マニュアル・規約</div>
        <a href="#" class="sidebar-link">worktalkマニュアル</a>
        <a href="#" class="sidebar-link">利用規約</a>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-title">お問い合わせ / 変更</div>
        <a href="contact.html" class="sidebar-link">お問い合わせはこちら</a>
        <a href="password-reset.html" class="sidebar-link">パスワード設定はこちら</a>
        <a href="human-resources.html" class="sidebar-link">担当者の情報編集はこちら</a>
        <a href="direct-url.html" class="sidebar-link">URL取得</a>
      </div>
    </nav>

    <main class="main">
      <div class="page-header">
        <h1 class="page-title">会社情報編集</h1>
      </div>

      <div class="table-card">
        <div class="form-section">
          <div class="form-row">
            <div class="form-row-label">
              <span class="form-label">会社ロゴ</span>
              <span class="badge-required">必須</span>
            </div>
            <div class="form-row-content">
              <div class="upload-area">
                <div class="upload-preview" style="width:85px;height:85px;">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:32px;height:32px;color:var(--color-text-muted);"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/></svg>
                </div>
                <div class="upload-actions">
                  <button class="btn btn-secondary btn-sm">ファイルを選択</button>
                  <p class="form-hint">ファイル形式：JPG　サイズ規定：横85px　縦85px　30KB以内</p>
                </div>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-row-label">
              <span class="form-label">ヒーロー画像</span>
              <span class="badge-required">必須</span>
            </div>
            <div class="form-row-content">
              <div class="upload-area">
                <div class="upload-preview" style="width:265px;height:140px;">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:40px;height:40px;color:var(--color-text-muted);"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                </div>
                <div class="upload-actions">
                  <button class="btn btn-secondary btn-sm">ファイルを選択</button>
                  <p class="form-hint">ファイル形式：JPG　サイズ推奨：横1060px　縦557px　700KB以内</p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary">変更を保存</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    function toggleSidebar() {
      document.querySelector('.sidebar').classList.toggle('open');
      document.querySelector('.sidebar-overlay').classList.toggle('open');
    }
  </script>
</body>
</html>
