<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>worktalk 企業管理画面 - パスワード再設定</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal {
      background: #fff;
      border-radius: 8px;
      padding: 48px 40px;
      max-width: 520px;
      width: 90%;
      text-align: center;
    }
    .modal h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--primary);
    }
    .modal p {
      font-size: 0.95rem;
      line-height: 1.8;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    .modal-btn-primary {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 32px;
      background: var(--primary);
      color: #fff;
      border: 2px solid var(--primary);
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      max-width: 320px;
    }
    .modal-btn-secondary {
      display: inline-block;
      margin-top: 12px;
      padding: 14px 32px;
      background: #fff;
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      max-width: 320px;
    }
  </style>
</head>
<body>
  <div class="layout">
    <header class="header">
      <div class="header-left">
        <button class="hamburger" onclick="toggleSidebar()" aria-label="メニュー">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <a href="company-top-nocard.html" class="header-logo">worktalk<span>企業管理画面</span></a>
      </div>
      <div class="header-right">
        <div class="header-company">マイキャリア株式会社<small>様</small></div>
        <div class="notification-bell">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <div class="notification-badge"></div>
        </div>
        <div class="header-user">
          <div class="avatar">担当</div>
          <div>
            <div class="header-user-name">採用担当者</div>
            <div class="header-user-role">企業アカウント</div>
          </div>
        </div>
      </div>
    </header>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <nav class="sidebar">
      <div class="sidebar-group">
        <div class="sidebar-group-title">応募者情報</div>
        <a href="company-top-nocard.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          応募者一覧
        </a>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-title">企業情報</div>
        <a href="company-info-edit.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          企業情報編集
        </a>
        <a href="jobposting.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
          求人情報作成
        </a>
        <a href="jobposting-list.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          求人情報一覧
        </a>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-title">マニュアル・規約</div>
        <a href="#" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          worktalkマニュアル
        </a>
        <a href="#" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          利用規約
        </a>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-title">お問い合わせ / 変更</div>
        <a href="contact.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          お問い合わせはこちら
        </a>
        <a href="password-reset.html" class="sidebar-link active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          パスワード設定はこちら
        </a>
        <a href="human-resources.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          担当者の情報編集はこちら
        </a>
        <a href="direct-url.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          URL取得
        </a>
      </div>
    </nav>

    <main class="main"></main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay">
    <div class="modal">
      <h2>パスワード再設定について</h2>
      <p>ご登録いただいているメールアドレス宛にメールを送信いたします。</p>
      <p>メールに添付のURLからパスワードの再設定をお願いいたします。</p>
      <button class="modal-btn-primary">パスワード再設定メールを送信する</button>
      <br>
      <button class="modal-btn-secondary" onclick="history.back()">閉じる</button>
    </div>
  </div>

  <script>
    function toggleSidebar() {
      document.querySelector('.sidebar').classList.toggle('open');
      document.querySelector('.sidebar-overlay').classList.toggle('open');
    }
  </script>
</body>
</html>
