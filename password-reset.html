<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>worktalk 企業管理画面 - パスワード再設定</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <header class="header">
      <div class="header-left">
        <button class="hamburger" onclick="toggleSidebar()" aria-label="メニュー">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <a href="company-top-nocard.html" class="header-logo">worktalk<span>企業管理画面</span></a>
      </div>
      <div class="header-right">
        <div class="header-company">マイキャリア株式会社<small>様</small></div>
        <div class="notification-bell">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <div class="notification-badge"></div>
        </div>
        <div class="header-user">
          <div class="avatar">担当</div>
          <div>
            <div class="header-user-name">採用担当者</div>
            <div class="header-user-role">企業アカウント</div>
          </div>
        </div>
      </div>
    </header>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <nav class="sidebar">
      <div class="sidebar-group">
        <div class="sidebar-group-title">応募者情報</div>
        <a href="company-top-nocard.html" class="sidebar-link">応募者一覧</a>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-title">企業情報</div>
        <a href="company-info-edit.html" class="sidebar-link">企業情報編集</a>
        <a href="jobposting.html" class="sidebar-link">求人情報作成</a>
        <a href="jobposting-list.html" class="sidebar-link">求人情報一覧</a>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-title">マニュアル・規約</div>
        <a href="#" class="sidebar-link">worktalkマニュアル</a>
        <a href="#" class="sidebar-link">利用規約</a>
      </div>
      <div class="sidebar-group">
        <div class="sidebar-group-title">お問い合わせ / 変更</div>
        <a href="contact.html" class="sidebar-link">お問い合わせはこちら</a>
        <a href="password-reset.html" class="sidebar-link active">パスワード設定はこちら</a>
        <a href="human-resources.html" class="sidebar-link">担当者の情報編集はこちら</a>
        <a href="direct-url.html" class="sidebar-link">URL取得</a>
      </div>
    </nav>

    <main class="main">
      <div class="page-header">
        <h1 class="page-title">パスワード再設定</h1>
      </div>

      <div class="table-card">
        <div class="info-section" style="text-align:center;max-width:480px;margin:0 auto;">
          <div class="info-icon" style="margin-bottom:24px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:48px;height:48px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <h2 style="font-size:1.15rem;font-weight:700;color:var(--color-primary);margin-bottom:20px;">パスワード再設定について</h2>
          <p style="margin-bottom:8px;line-height:1.8;">ご登録いただいているメールアドレス宛にメールを送信いたします。</p>
          <p style="margin-bottom:32px;line-height:1.8;">メールに添付のURLからパスワードの再設定をお願いいたします。</p>
          <button class="btn btn-primary" style="width:100%;max-width:320px;padding:12px 24px;font-size:0.95rem;">パスワード再設定メールを送信する</button>
          <br><br>
          <a href="company-top-nocard.html" class="btn btn-secondary" style="width:100%;max-width:320px;padding:12px 24px;font-size:0.95rem;text-decoration:none;justify-content:center;">戻る</a>
        </div>
      </div>
    </main>
  </div>

  <script>
    function toggleSidebar() {
      document.querySelector('.sidebar').classList.toggle('open');
      document.querySelector('.sidebar-overlay').classList.toggle('open');
    }
  </script>
</body>
</html>
