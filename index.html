<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>worktalk 管理画面モックアップ</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .landing {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--color-bg);
      padding: 24px;
    }

    .landing-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .landing-logo {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 8px;
    }

    .landing-subtitle {
      font-size: 0.9rem;
      color: var(--color-text-secondary);
      margin-bottom: 36px;
    }

    .landing-links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .landing-link {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      text-decoration: none;
      color: var(--color-text);
      transition: all 0.15s;
    }

    .landing-link:hover {
      border-color: var(--color-primary);
      background: var(--color-primary-50);
      box-shadow: var(--shadow-sm);
    }

    .landing-link-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      background: var(--color-primary-light);
      color: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .landing-link-icon svg {
      width: 20px;
      height: 20px;
    }

    .landing-link-text {
      text-align: left;
    }

    .landing-link-title {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .landing-link-desc {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="landing">
    <div class="landing-card">
      <div class="landing-logo">worktalk</div>
      <div class="landing-subtitle">管理画面デザインモックアップ</div>
      <div style="font-size:0.75rem;color:var(--color-text-secondary);margin-bottom:8px;font-weight:600;">カードあり</div>
      <div class="landing-links">
        <a href="admin-top.html" class="landing-link">
          <div class="landing-link-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 15v2m-6 4h12a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2zm10-10V7a4 4 0 0 0-8 0v4h8z"/></svg>
          </div>
          <div class="landing-link-text">
            <div class="landing-link-title">運営管理画面</div>
            <div class="landing-link-desc">admin_top -- 統計カード付き</div>
          </div>
        </a>
        <a href="company-top.html" class="landing-link">
          <div class="landing-link-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/><path d="M9 9h1"/><path d="M9 13h1"/><path d="M9 17h1"/></svg>
          </div>
          <div class="landing-link-text">
            <div class="landing-link-title">企業管理画面</div>
            <div class="landing-link-desc">company_top -- 統計カード付き</div>
          </div>
        </a>
      </div>
      <div style="font-size:0.75rem;color:var(--color-text-secondary);margin:20px 0 8px;font-weight:600;">カードなし</div>
      <div class="landing-links">
        <a href="admin-top-nocard.html" class="landing-link">
          <div class="landing-link-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 15v2m-6 4h12a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2zm10-10V7a4 4 0 0 0-8 0v4h8z"/></svg>
          </div>
          <div class="landing-link-text">
            <div class="landing-link-title">運営管理画面</div>
            <div class="landing-link-desc">admin_top -- テーブルのみ</div>
          </div>
        </a>
        <a href="company-top-nocard.html" class="landing-link">
          <div class="landing-link-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/><path d="M9 9h1"/><path d="M9 13h1"/><path d="M9 17h1"/></svg>
          </div>
          <div class="landing-link-text">
            <div class="landing-link-title">企業管理画面</div>
            <div class="landing-link-desc">company_top -- テーブルのみ</div>
          </div>
        </a>
      </div>
      <div style="font-size:0.75rem;color:var(--color-text-secondary);margin:20px 0 8px;font-weight:600;">企業管理画面 サブページ</div>
      <div class="landing-links">
        <a href="company-info-edit.html" class="landing-link">
          <div class="landing-link-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </div>
          <div class="landing-link-text">
            <div class="landing-link-title">企業情報編集</div>
            <div class="landing-link-desc">会社ロゴ・ヒーロー画像</div>
          </div>
        </a>
        <a href="jobposting.html" class="landing-link">
          <div class="landing-link-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
          </div>
          <div class="landing-link-text">
            <div class="landing-link-title">求人情報作成</div>
            <div class="landing-link-desc">職種・エリア・ポジション概要</div>
          </div>
        </a>
        <a href="jobposting-list.html" class="landing-link">
          <div class="landing-link-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div class="landing-link-text">
            <div class="landing-link-title">求人情報一覧</div>
            <div class="landing-link-desc">公開/非公開・複製・削除</div>
          </div>
        </a>
        <a href="contact.html" class="landing-link">
          <div class="landing-link-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <div class="landing-link-text">
            <div class="landing-link-title">お問い合わせ</div>
            <div class="landing-link-desc">担当者連絡先</div>
          </div>
        </a>
        <a href="password-reset.html" class="landing-link">
          <div class="landing-link-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <div class="landing-link-text">
            <div class="landing-link-title">パスワード再設定</div>
            <div class="landing-link-desc">モーダルダイアログ</div>
          </div>
        </a>
        <a href="human-resources.html" class="landing-link">
          <div class="landing-link-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          </div>
          <div class="landing-link-text">
            <div class="landing-link-title">担当者情報編集</div>
            <div class="landing-link-desc">氏名・電話・メール</div>
          </div>
        </a>
        <a href="direct-url.html" class="landing-link">
          <div class="landing-link-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          </div>
          <div class="landing-link-text">
            <div class="landing-link-title">URL取得</div>
            <div class="landing-link-desc">worktalk専用URL</div>
          </div>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
